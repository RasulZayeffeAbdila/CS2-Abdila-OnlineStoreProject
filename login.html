{% extends "base.html" %}
{% block title %}Sign In — VEND{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="logo">V<span>E</span>ND</div>
    <div class="logo-sub">Online Store</div>
    <div class="auth-sub">Sign in to your account</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form id="loginForm" novalidate>
      <label class="lbl">Username</label>
      <input class="inp" id="username" type="text" placeholder="Enter username"/>
      <div class="field-err" id="err-username"></div>

      <label class="lbl">Password</label>
      <input class="inp" id="password" type="password" placeholder="Enter password"/>
      <div class="field-err" id="err-password"></div>

      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="divider">or</div>
    <center><a class="link" href="/register">No account? Register</a></center>

  </div>
</div>

<script>
const usernameErrors = [
  "Username cannot be empty.",
  "You need to enter a username.",
  "A username is required to continue.",
  "Please provide your username.",
];
const passwordErrors = [
  "Password cannot be empty.",
  "You need to enter a password.",
  "A password is required to continue.",
  "Please provide your password.",
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  let valid = true;

  if (!username) { showErr("err-username", pick(usernameErrors)); valid = false; }
  else             showErr("err-username", "");

  if (!password) { showErr("err-password", pick(passwordErrors)); valid = false; }
  else             showErr("err-password", "");

  if (valid) {
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "/login";
    [["username", username], ["password", password]].forEach(([n, v]) => {
      const i = document.createElement("input");
      i.name = n; i.value = v;
      form.appendChild(i);
    });
    document.body.appendChild(form);
    form.submit();
  }
});
</script>
{% endblock %}
