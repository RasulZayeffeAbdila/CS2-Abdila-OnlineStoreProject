{% extends "base.html" %}
{% block title %}Register — VEND{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="logo">V<span>E</span>ND</div>
    <div class="logo-sub">Online Store</div>
    <div class="auth-sub">Create a new account</div>

    {% if error   %}<div class="err">{{ error }}</div>{% endif %}
    {% if success %}<div class="succ">{{ success }}</div>{% endif %}

    <form id="regForm" novalidate>
      <label class="lbl">Full Name</label>
      <input class="inp" id="name" type="text" placeholder="e.g. Juan Dela Cruz"/>
      <div class="field-err" id="err-name"></div>

      <label class="lbl">Username</label>
      <input class="inp" id="username" type="text" placeholder="Choose a username"/>
      <div class="field-err" id="err-username"></div>

      <label class="lbl">Password</label>
      <input class="inp" id="password" type="password" placeholder="Choose a password"/>
      <div class="field-err" id="err-password"></div>

      <label class="lbl">Age</label>
      <input class="inp" id="age" type="number" placeholder="Your age" min="1"/>
      <div class="field-err" id="err-age"></div>

      <label class="lbl">Address</label>
      <input class="inp" id="address" type="text" placeholder="Your address"/>
      <div class="field-err" id="err-address"></div>

      <button class="btn" type="submit">Create Account</button>
    </form>

    <div class="divider">or</div>
    <center><a class="link" href="/login">Already have an account? Sign In</a></center>

  </div>
</div>

<script>
const errors = {
  name:     ["Full name is required.", "You need to enter your name.", "Name cannot be left empty."],
  username: ["Username is required.", "You need to choose a username.", "Username cannot be left empty."],
  password: ["Password is required.", "You need to choose a password.", "Password cannot be left empty."],
  age:      ["Age is required.", "You need to enter your age.", "Age cannot be left empty."],
  address:  ["Address is required.", "You need to enter your address.", "Address cannot be left empty."],
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showErr(id, msg) {
  const el = document.getElementById("err-" + id);
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

document.getElementById("regForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const fields = ["name", "username", "password", "age", "address"];
  const values = {};
  let valid = true;

  fields.forEach(f => {
    const val = document.getElementById(f).value.trim();
    values[f] = val;
    if (!val) { showErr(f, pick(errors[f])); valid = false; }
    else         showErr(f, "");
  });

  if (valid) {
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "/register";
    Object.entries(values).forEach(([n, v]) => {
      const i = document.createElement("input");
      i.name = n; i.value = v;
      form.appendChild(i);
    });
    document.body.appendChild(form);
    form.submit();
  }
});
</script>
{% endblock %}
